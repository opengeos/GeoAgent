on:
    push:
        branches:
            - main
            - master
    pull_request:
        branches:
            - main
            - master

name: Windows build
jobs:
    test-windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install -e ".[dev]"
            - name: PKG-TEST
              run: pytest tests/ -v
